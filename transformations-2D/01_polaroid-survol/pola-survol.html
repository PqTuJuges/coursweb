<!--
@import url('https://fonts.googleapis.com/css?family=Dancing+Script');

*{
	font-family: 'Dancing Script', cursive;
}

h1{
	font-size:1.5em;
	text-align:center;
	height:80px;
	margin:3em;
}

article{
	display:flex;
	flex-wrap: nowrap;
	justify-content:center;
	
	
	margin:0 auto;
	list-style-type:none;
	text-align:center;
	}
	
figure{
	margin:0;
	padding:0;
}	

figure#img1,figure#img2,figure#img3{
	position:relative;
	width:320px;
	height:320px;
	background-color:#FFF;
	padding:0px 5px 60px 5px ;
	font-size:24px;
	box-shadow:3px 3px 10px #999;

	}
	
figure#img1{
	transform:rotate(18deg);
	}

figure#img2{
	transform:rotate(-18deg);
	}
figure#img3{
	transform:rotate(18deg);
	}

figure span{
	position :absolute;
	left:-10000px;
	
	/*display:none;*/
}	
	
figure:hover span{
	left:0px;
	bottom:5px;
	/*display:block;*/
	font-size:0.6em;
}	
	
figure::before{ 
  content:url(images/punaise.png);
}




figure#img1:hover,figure#img2:hover,figure#img3:hover {
	transform:rotate(0deg) scale(1.5);
	z-index:1000;
	outline:1px solid black;
	padding:0;
	box-shadow:none;
}
figure:hover::before{
	content:none;
	/*display:none;*/
}

figure:hover figcaption{
	display:none;
}




/*--------------------------------*/
