<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Contact</title>
</head>
<body>

  <div class="wrapper">

    <!-- COLONNE GAUCHE : image + infos -->
    <figure>
      <img src="Best-Things-To-Do-In-Seoul-South-Korea-9.jpg" alt="background">
      <div class="infos">
        <div class="info-item">
          <span class="icon">📍</span>
          <div>
            <h3>Address</h3>
            <p class="adresse">SEOUL</p>
          </div>
        </div>
        <div class="info-item">
          <span class="icon">📞</span>
          <div>
            <h3>Lets Talk</h3>
            <p>48484848484</p>
          </div>
        </div>
        <div class="info-item">
          <span class="icon">✉️</span>
          <div>
            <h3>General Support</h3>
            <p>contact@example.com</p>
          </div>
        </div>
      </div>
    </figure>

    <!-- COLONNE DROITE : formulaire -->
    <div class="form-side">
      <h2>Send Us A Message</h2>

      <form>
        <div class="form-group">
          <label>Tell us your name <span>*</span></label>
          <div class="form-row">
            <input type="text" placeholder="First name">
            <input type="text" placeholder="Last name">
          </div>
        </div>

        <div class="form-group">
          <label>Enter your email <span>*</span></label>
          <input type="email" placeholder="wqewe@gmail.com">
        </div>

        <div class="form-group">
          <label>Enter phone number</label>
          <input type="tel" placeholder="454848484">
        </div>

        <div class="form-group">
          <label>Message <span>*</span></label>
          <textarea placeholder="Write us a message"></textarea>
        </div>

        <button type="submit">Send Message</button>
      </form>
    </div>

  </div>

</body>
</html>
